events {}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;

        # Serve index.html at /
        location = / {
            try_files /index.html =404;
        }

        # Serve cloud-setup.html for /cloud-setup/*
        location /cloud-setup/ {
            try_files /cloud-setup.html =404;
        }

        # Serve static assets (CSS, JS, images, fonts)
        location /assets/ {
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        }

        # Suppress favicon.ico errors
        location = /favicon.ico {
            try_files /assets/favicon.png =204;
            log_not_found off;
            access_log off;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
